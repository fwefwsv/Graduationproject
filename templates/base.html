<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}阿尔兹海默症智能分析预测系统{% endblock %}</title>
    
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- DaisyUI -->
    <link href="https://cdn.bootcdn.net/ajax/libs/daisyui/4.12.10/full.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="{{ url_for('static', filename='js/chart.umd.min.js') }}"></script>
    <!-- 自定义样式 -->
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .feature-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
    
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50">
    <!-- 导航栏 -->
    <nav class="navbar bg-base-100 shadow-lg">
        <div class="navbar-start">
            <div class="dropdown">
                <label tabindex="0" class="btn btn-ghost lg:hidden">
                    <i class="fas fa-bars text-xl"></i>
                </label>
                <ul tabindex="0" class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52">
                    <li><a href="/"><i class="fas fa-home mr-2"></i>首页</a></li>
                    <li><a href="/predict"><i class="fas fa-brain mr-2"></i>智能检测</a></li>
                </ul>
            </div>
            <a class="btn btn-ghost normal-case text-xl" href="/">
                <i class="fas fa-brain text-primary mr-2"></i>
                阿尔兹海默症预测系统
            </a>
        </div>
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1">
                <li><a href="/" class="hover:bg-primary/10"><i class="fas fa-home mr-2"></i>首页</a></li>
                <li><a href="/predict" class="hover:bg-primary/10"><i class="fas fa-brain mr-2"></i>智能检测</a></li>
            </ul>
        </div>
        <div class="navbar-end">
            <button class="btn btn-ghost btn-circle">
                <i class="fas fa-user-md text-xl"></i>
            </button>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="min-h-screen">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="footer footer-center p-10 bg-base-200 text-base-content">
        <div>
            <i class="fas fa-brain text-4xl text-primary mb-2"></i>
            <p class="font-bold">阿尔兹海默症智能分析预测系统</p>
            <p>基于机器学习的早期风险预测与辅助诊断</p>
        </div>
        <div>
            <div class="grid grid-flow-col gap-4">
                <a class="link link-hover">关于我们</a>
                <a class="link link-hover">联系方式</a>
                <a class="link link-hover">隐私政策</a>
                <a class="link link-hover">技术支持</a>
            </div>
        </div>
        <div>
            <p>Copyright © 2024 - 基于机器学习技术的医疗辅助系统</p>
        </div>
    </footer>

    <!-- 自定义脚本 -->
    <script>
        // 全局工具函数
        function showLoading() {
            document.getElementById('loading-spinner').classList.remove('hidden');
        }
        
        function hideLoading() {
            document.getElementById('loading-spinner').classList.add('hidden');
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type} fixed top-4 right-4 z-50`;
            toast.innerHTML = `
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
