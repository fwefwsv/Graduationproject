<!-- templates/visualization.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿尔兹海默症智能分析系统 - 数据可视化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 50px; }
        header h1 { color: white; font-size: 42px; margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { color: rgba(255,255,255,0.9); font-size: 20px; }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(550px, 1fr)); 
            gap: 40px; 
            padding: 30px;
        }
        .card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.25); 
            transition: all 0.3s ease;
        }
        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }
        .card img { 
            width: 100%; 
            height: 400px; 
            object-fit: contain;
            background: #f8f9fa;
        }
        .card .info { 
            padding: 25px; 
            text-align: center;
        }
        .card h3 { 
            color: #2d3748; 
            font-size: 22px; 
            margin-bottom: 12px;
            font-weight: 600;
        }
        .card .filename { 
            color: #718096; 
            font-size: 14px; 
            font-family: monospace;
        }
        .no-images { 
            text-align: center; 
            background: white; 
            padding: 80px; 
            border-radius: 20px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }
        .no-images h2 { 
            color: #4a5568; 
            margin-bottom: 25px;
            font-size: 28px;
        }
        .no-images p { 
            color: #718096; 
            margin-bottom: 25px;
            font-size: 16px;
        }
        .btn { 
            display: inline-block; 
            padding: 14px 36px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            text-decoration: none; 
            border-radius: 35px; 
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.3s ease;
        }
        .btn:hover { 
            transform: scale(1.05);
        }
        .back-link { 
            display: inline-block; 
            margin-bottom: 25px; 
            color: white; 
            text-decoration: none; 
            font-size: 18px; 
            padding: 12px 25px; 
            background: rgba(255,255,255,0.2); 
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        .back-link:hover { 
            background: rgba(255,255,255,0.3);
            transform: translateX(-5px);
        }
        /* 图片放大查看功能 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.9);
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
        }
        .close:hover,
        .close:focus {
            color: #bbb;
            text-decoration: none;
            cursor: pointer;
        }
        .card img:hover {
            cursor: zoom-in;
        }
        @media (max-width: 768px) { 
            .gallery { 
                grid-template-columns: 1fr; 
                padding: 15px;
                gap: 25px;
            }
            header h1 {
                font-size: 32px;
            }
            .card img {
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回首页</a>
        <header>
            <h1>📊 数据可视化展示</h1>
            <p>探索阿尔兹海默症数据的可视化图表</p>
        </header>

        {% if images %}
            <div class="gallery">
                {% for image in images %}
                    <div class="card">
                        <img src="{{ image.path }}" alt="{{ image.title }}" loading="lazy">
                        <div class="info">
                            <h3>{{ image.title }}</h3>
                            <div class="filename">{{ image.filename }}</div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="no-images">
                <h2>📷 暂无图片</h2>
                <p>static/images 目录下暂无图片文件</p>
                <p>请先运行 model_training.py 生成数据可视化图表</p>
                <a href="#" onclick="alert('请在终端运行: python model_training.py')" class="btn">了解如何生成图片</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
